<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bigburger Savdo</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>

<body>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Bigburger Savdo</h1>
            <button onclick="openExpenseModal()"
                style="background: #0762ff; color: #ffffff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                Xarajat
            </button>
        </div>

        <div id="expense-modal"
            style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
            <div style="background:white; padding:20px; border-radius:15px; width:90%; max-width:400px;">
                <h3 style="margin-top:0;">Xarajat kiritish</h3>
                <input type="number" id="exp-amount" placeholder="Summa (so'm)"
                    style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
                <input type="text" id="exp-reason" placeholder="Nima uchun? (Masalan: Go'sht)"
                    style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">

                <div style="display:flex; gap:10px;">
                    <button onclick="saveExpense()"
                        style="flex:2; background:#28a745; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold;">Saqlash</button>
                    <button onclick="closeExpenseModal()"
                        style="flex:1; background:#6c757d; color:white; border:none; padding:12px; border-radius:8px;">Yopish</button>
                </div>
            </div>
        </div>
        <div style="margin-bottom: 15px;">
            <input type="text" id="search-input" oninput="filterMenu()" placeholder="Mahsulot qidirish..."
                style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
        </div>

        <div class="category-container">
            <div id="category-tabs" class="category-tabs"></div>
        </div>

        <div class="table-selector" style="margin: 15px 0;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #444;">Stolni tanlang:</label>
            <select id="table-number" onchange="switchTable()"
                style="width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #007bff; font-size: 16px; outline: none; background: white;">
                <option value="1-stol">1-stol</option>
                <option value="2-stol">2-stol</option>
                <option value="3-stol">3-stol</option>
                <option value="4-stol">4-stol</option>
                <option value="5-stol">5-stol</option>
                <option value="Olib ketish">Olib ketish (Dostavka)</option>
            </select>
        </div>

        <div id="staff-section">
            <div id="menu-items"></div>
            <hr>

            <h3>Savat:</h3>
            <ul id="cart-list" style="list-style: none; padding: 0;"></ul>

            <div
                style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #eee;">
                <h3 style="margin: 0;">Jami: <span id="total-sum">0</span> so'm</h3>
            </div>

            <div style="display: flex; gap: 10px; flex-direction: column;">
                <div style="margin: 10px 0;">
                    <label style="font-weight: bold; color: #444;">To'lov turi:</label>
                    <select id="payment-method"
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #007bff; margin-top: 5px;">
                        <option value="naqd">💵 Naqd pul</option>
                        <option value="karta">💳 Plastik karta (Uzcard/Humo)</option>
                    </select>
                </div>
                <button onclick="completeSale()" class="btn-success"
                    style="padding: 15px; font-size: 18px;">Sotish</button>
                <button onclick="orders[activeTable]=[]; updateTotal();" class="btn-cancel"
                    style="background: #6c757d;">Savatni tozalash</button>
            </div>
        </div>

        <hr style="margin: 30px 0;">

        <div id="admin-section">
            <button onclick="toggleAdmin()" id="admin-btn"
                style="width: 100%; background: #333; padding: 12px; color: white; border: none; border-radius: 8px; cursor: pointer;">
                🔐 Admin Paneli
            </button>

            <div id="admin-data"
                style="display: none; margin-top: 20px; background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <h3 style="text-align: center; color: #333;">Hisobotlar Paneli</h3>

                <button onclick="sendDailyReportToTelegram()"
                    style="background: #0088cc; color: white; width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    ✈️ Telegramga hisobot yuborish
                </button>

                <div class="filter-group"
                    style="display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px;">
                    <button onclick="showStats('today')" class="cat-btn active">Bugun</button>
                    <button onclick="showStats('week')" class="cat-btn">Hafta</button>
                    <button onclick="showStats('month')" class="cat-btn">Oy</button>
                    <button onclick="showStats('all')" class="cat-btn">Hammasi</button>
                </div>

                <div id="stats-output"></div>

                <hr style="margin: 20px 0;">

                <button onclick="clearHistory()" class="btn-cancel"
                    style="background: #dc3545; width: 100%; font-size: 14px; opacity: 0.8;">
                    🗑️ Butun tarixni o'chirish
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
